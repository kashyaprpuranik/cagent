# =============================================================================
# Data Plane Infrastructure Services
# =============================================================================
#
# Modes:
#   standalone: No control plane, use static config only
#   connected:  Use control plane API, fall back to static config
#
# Usage:
#   Standard mode (gVisor - RECOMMENDED for production):
#     docker-compose --profile standard up -d
#     Requires gVisor: https://gvisor.dev/docs/user_guide/install/
#
#   Development mode (no gVisor - for local dev or if gVisor unavailable):
#     docker-compose --profile dev up -d
#
#   With local admin UI + email proxy:
#     docker-compose --profile standard --profile admin up -d
#     Open http://localhost:8081
#     Note: In connected mode (DATAPLANE_MODE=connected), admin UI is read-only
#
#   With auditing (log forwarding):
#     docker-compose --profile standard --profile auditing up -d
#
#   With direct SSH access (port mapping):
#     SSH_AUTHORIZED_KEYS="ssh-ed25519 AAAA..." docker-compose --profile dev up -d
#     ssh -p 2222 cell@localhost
#
# Network Architecture:
#   cell-net (isolated, internal)
#     └── cell(s): can ONLY reach http-proxy + dns-filter (dynamic IPs)
#     Scale with: docker compose --scale cell-dev=N
#
#   infra-net (can reach control plane)
#     └── http-proxy, dns-filter (bridged to cell-net)
#     └── warden (config sync, admin UI, domain policy API)
#     └── log-shipper (log forwarding) - optional
#     └── email-proxy (IMAP/SMTP proxy) - optional, beta
#
# Security Controls:
#   - Cell has no direct internet/CP access (IP bypass prevention)
#   - MITM proxy decrypts HTTPS so Envoy can enforce controls
#   - Credential injection handled by HTTP proxy ext_authz filter (warden)
#   - Only HTTP proxy and log shipper can reach control plane
#   - Cloud metadata (169.254.169.254) blocked at two layers:
#     1. cell-net is internal:true — no default gateway, no route to link-local
#     2. Envoy catch-all returns 403 for any non-allowlisted domain/IP
#
# Resource Budget (target: 2 vCPU / 4GB, e.g. Hetzner cax11):
#   Infra containers are sized to the minimum that passes a full health
#   check (DNS resolution, HTTP/HTTPS proxy chain, warden API, OpenObserve
#   ingestion, 30s stability with no OOM kills or restarts). Limits were
#   determined by binary-searching across 19 automated trials using
#   scripts/resource_test.sh. The cell gets everything left over.
#
#   Container        CPU    Memory   Role
#   ─────────────    ───    ──────   ──────────────────────────
#   cell             1.50   3G       Agent sandbox (gVisor/runc)
#   warden           0.25   256M     Config sync, admin API, mTLS proxy
#   http-proxy       0.10   80M      Envoy egress gateway (--concurrency 1, stats off)
#   log-store        0.10   160M     OpenObserve (per-DP logs, 2 workers)
#   mitm-proxy       0.10   80M      TLS termination (mitmproxy, no flow retention)
#   log-shipper      0.10   48M      Vector log collection
#   dns-filter       0.05   32M      CoreDNS domain allowlist
#   ─────────────    ───    ──────
#   Total            2.20   3.7G     Fits 2 vCPU / 4GB with ~300M OS headroom
#
# =============================================================================

services:
  # ===========================================================================
  # Cell (DEVELOPMENT - runc runtime, no gVisor)
  # Use when gVisor is not installed or for local development
  # For production, use --profile standard (gVisor) instead
  # ===========================================================================
  cell-dev:
    build:
      context: .
      dockerfile: cell.Dockerfile
      args:
        - VARIANT=${CELL_VARIANT:-lean}
    image: ghcr.io/kashyaprpuranik/cagent-cell:latest-${CELL_VARIANT:-lean}
    # No container_name — allows `docker compose --scale cell-dev=N`
    labels:
      - "cagent.role=cell"
      - "cagent.log-collect=true"
    profiles:
      - dev

    # Standard container runtime (no gVisor)
    runtime: runc

    # Security hardening — drop ALL capabilities, add back only what's needed
    cap_drop:
      - ALL
    cap_add:
      - CHOWN            # entrypoint: chown on SSH keys, tmux dirs
      - DAC_OVERRIDE     # read/write files across users during setup
      - FOWNER           # entrypoint: chmod on SSH authorized_keys
      - SETUID           # gosu + sshd privilege separation
      - SETGID           # gosu + sshd privilege separation
      - NET_BIND_SERVICE # sshd binds port 22
      - SYS_CHROOT       # sshd privilege separation (ChrootDirectory)
      - AUDIT_WRITE      # sshd/PAM audit logging
      - KILL             # sshd manages child processes
    security_opt:
      - no-new-privileges:true
      # Block raw sockets to prevent proxy bypass via packet crafting
      - seccomp:./configs/seccomp/cell-profile.json

    # Resource limits (configurable via cagent.yaml → warden → .env)
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 3G
          pids: ${CELL_PIDS_LIMIT:-256}
        reservations:
          cpus: '0.25'
          memory: 256M

    # DNS forced through dns-filter (dns-filter-2 failover via --profile dns-ha)
    dns:
      - 10.200.1.5
      - 10.200.1.6

    # Environment
    environment:
      - HTTP_PROXY=http://10.200.1.10:8443
      - HTTPS_PROXY=${HTTPS_PROXY:-http://10.200.1.15:8080}
      - http_proxy=http://10.200.1.10:8443
      - https_proxy=${HTTPS_PROXY:-http://10.200.1.15:8080}
      - NO_PROXY=localhost,127.0.0.1
      - no_proxy=localhost,127.0.0.1
      - SSL_CERT_FILE=/tmp/ca-certificates.crt
      - REQUESTS_CA_BUNDLE=/tmp/ca-certificates.crt
      - NODE_EXTRA_CA_CERTS=/tmp/ca-certificates.crt
      - CURL_CA_BUNDLE=/tmp/ca-certificates.crt
      - USER_NAME=cell
      # SSH public keys (paste your public key here or mount file)
      - SSH_AUTHORIZED_KEYS=${SSH_AUTHORIZED_KEYS:-}
      # Tmux session settings
      - TMUX_AUTO_ATTACH=${TMUX_AUTO_ATTACH:-1}  # Set to 0 to disable auto-attach
      - TMUX_SESSION=${TMUX_SESSION:-main}       # Default session name

    # SSH access (set SSH_AUTHORIZED_KEYS to enable)
    ports:
      - "${SSH_PORT:-2222}:22"

    # Read-only root filesystem (defense-in-depth)
    read_only: true
    tmpfs:
      - /tmp:size=100M
      - /run:size=10M
      - /var/log:size=50M
      - /etc/ssh:size=1M           # sshd host key generation at startup
      - /home/cell:size=10M        # SSH keys, tmux config written by entrypoint
      - /etc/profile.d:size=1M     # tmux env setup by entrypoint

    # Volumes
    volumes:
      - cell-logs:/var/log/cell
      - cell-workspace:/workspace
      - ./configs/mitm/mitmproxy-ca-cert.pem:/tmp/mitm-ca.pem:ro
      # Optional: mount SSH keys file
      # - ./ssh-keys:/ssh-keys:ro

    # ONLY on cell-net - cannot reach infra-net or external directly
    # IP auto-assigned from 10.200.1.0/24 (static IPs only on infra services)
    networks:
      cell-net: {}

    # Capture output to Docker logs (read by log shipper)
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"

    healthcheck:
      test: ["CMD-SHELL", "kill -0 1"]
      interval: 30s
      timeout: 5s
      retries: 3

    depends_on:
      - http-proxy
      - dns-filter

    restart: unless-stopped

  # ===========================================================================
  # Cell (STANDARD - gVisor isolation, recommended for production)
  # Requires gVisor: https://gvisor.dev/docs/user_guide/install/
  # Use --profile dev if gVisor is not installed
  # ===========================================================================
  cell:
    build:
      context: .
      dockerfile: cell.Dockerfile
      args:
        - VARIANT=${CELL_VARIANT:-lean}
    image: ghcr.io/kashyaprpuranik/cagent-cell:latest-${CELL_VARIANT:-lean}
    # No container_name — allows `docker compose --scale cell=N`
    labels:
      - "cagent.role=cell"
      - "cagent.log-collect=true"
    profiles:
      - standard

    # gVisor runtime - syscalls intercepted in user-space
    runtime: runsc

    # Security hardening — drop ALL capabilities, add back only what's needed
    cap_drop:
      - ALL
    cap_add:
      - CHOWN            # entrypoint: chown on SSH keys, tmux dirs
      - DAC_OVERRIDE     # read/write files across users during setup
      - FOWNER           # entrypoint: chmod on SSH authorized_keys
      - SETUID           # gosu + sshd privilege separation
      - SETGID           # gosu + sshd privilege separation
      - NET_BIND_SERVICE # sshd binds port 22
      - SYS_CHROOT       # sshd privilege separation (ChrootDirectory)
      - AUDIT_WRITE      # sshd/PAM audit logging
      - KILL             # sshd manages child processes

    # Strict security options
    security_opt:
      - no-new-privileges:true
      - seccomp:./configs/seccomp/cell-profile.json  # defense-in-depth: host seccomp + gVisor

    # Resource limits (configurable via cagent.yaml → warden → .env)
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 3G
          pids: ${CELL_PIDS_LIMIT:-256}
        reservations:
          cpus: '0.25'
          memory: 256M

    # DNS forced through dns-filter (dns-filter-2 failover via --profile dns-ha)
    dns:
      - 10.200.1.5
      - 10.200.1.6

    # Environment
    environment:
      - HTTP_PROXY=http://10.200.1.10:8443
      - HTTPS_PROXY=${HTTPS_PROXY:-http://10.200.1.15:8080}
      - http_proxy=http://10.200.1.10:8443
      - https_proxy=${HTTPS_PROXY:-http://10.200.1.15:8080}
      - NO_PROXY=localhost,127.0.0.1
      - no_proxy=localhost,127.0.0.1
      - SSL_CERT_FILE=/tmp/ca-certificates.crt
      - REQUESTS_CA_BUNDLE=/tmp/ca-certificates.crt
      - NODE_EXTRA_CA_CERTS=/tmp/ca-certificates.crt
      - CURL_CA_BUNDLE=/tmp/ca-certificates.crt
      - USER_NAME=cell
      - SSH_AUTHORIZED_KEYS=${SSH_AUTHORIZED_KEYS:-}
      - TMUX_AUTO_ATTACH=${TMUX_AUTO_ATTACH:-1}
      - TMUX_SESSION=${TMUX_SESSION:-main}

    # SSH access (set SSH_AUTHORIZED_KEYS to enable)
    ports:
      - "${SSH_PORT:-2222}:22"

    # Read-only root filesystem (defense-in-depth)
    read_only: true
    tmpfs:
      - /tmp:size=100M
      - /run:size=10M
      - /var/log:size=50M
      - /etc/ssh:size=1M           # sshd host key generation at startup
      - /home/cell:size=10M        # SSH keys, tmux config written by entrypoint
      - /etc/profile.d:size=1M     # tmux env setup by entrypoint

    # Volumes (more restricted in secure mode)
    volumes:
      - cell-logs:/var/log/cell
      - cell-workspace:/workspace:rw
      - ./configs/mitm/mitmproxy-ca-cert.pem:/tmp/mitm-ca.pem:ro

    # ONLY on cell-net
    # IP auto-assigned from 10.200.1.0/24 (static IPs only on infra services)
    networks:
      cell-net: {}

    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

    healthcheck:
      test: ["CMD-SHELL", "kill -0 1"]
      interval: 30s
      timeout: 5s
      retries: 3

    depends_on:
      - http-proxy
      - dns-filter

    restart: unless-stopped

  # ===========================================================================
  # DNS Filter (redundant) - Enable with --profile dns-ha
  # Uses the same Corefile as the primary. If dns-filter goes down,
  # cells fall back to this instance automatically (standard DNS client behavior).
  # ===========================================================================
  dns-filter-2:
    profiles: ["dns-ha"]
    image: ghcr.io/kashyaprpuranik/coredns:latest
    container_name: dns-filter-2
    labels:
      - "cagent.log-collect=true"
    security_opt:
      - no-new-privileges:true
    volumes:
      - ./configs/coredns:/etc/coredns
    command: ["-conf", "/etc/coredns/Corefile"]
    healthcheck:
      # CoreDNS scratch image has no shell/wget/curl — use the binary itself
      test: ["CMD", "/coredns", "-plugins"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      cell-net:
        ipv4_address: 10.200.1.6
      infra-net:
        ipv4_address: 10.200.2.6
    restart: unless-stopped

  # ===========================================================================
  # DNS Filter - CoreDNS with domain allowlist
  # Bridged to both networks so cell can resolve DNS
  # Corefile generated by warden from CP allowlist + static config
  # ===========================================================================
  dns-filter:
    image: ghcr.io/kashyaprpuranik/coredns:latest
    container_name: dns-filter
    labels:
      - "cagent.log-collect=true"
    security_opt:
      - no-new-privileges:true
    # Scaling: to run >1 replica, remove container_name and static IPs, add a load balancer
    # deploy:
    #   replicas: ${DNS_FILTER_REPLICAS:-1}

    volumes:
      # Corefile from host (static default, overwritten by warden when it syncs)
      - ./configs/coredns:/etc/coredns

    command: ["-conf", "/etc/coredns/Corefile"]

    healthcheck:
      # CoreDNS scratch image has no shell/wget/curl — use the binary itself
      test: ["CMD", "/coredns", "-plugins"]
      interval: 30s
      timeout: 5s
      retries: 3

    deploy:
      resources:
        limits:
          cpus: '0.05'
          memory: 32M
        reservations:
          cpus: '0.05'
          memory: 16M

    # On BOTH networks - cell-net for cell access, infra-net for upstream
    networks:
      cell-net:
        ipv4_address: 10.200.1.5
      infra-net:
        ipv4_address: 10.200.2.5

    restart: unless-stopped

  # ===========================================================================
  # HTTP Proxy - Egress gateway with logging and credential injection
  # Config generated by warden from cagent.yaml
  # ===========================================================================
  http-proxy:
    image: ghcr.io/kashyaprpuranik/envoy:v1.28-latest
    container_name: http-proxy
    labels:
      - "cagent.log-collect=true"
    security_opt:
      - no-new-privileges:true
    # Scaling: to run >1 replica, remove container_name and static IPs, add a load balancer
    # deploy:
    #   replicas: ${HTTP_PROXY_REPLICAS:-1}

    volumes:
      # Generated config from warden (falls back to static if not present)
      - proxy-config:/etc/envoy
      # Static config as fallback (copied by entrypoint if no generated config)
      - ./configs/envoy/envoy-enhanced.yaml:/etc/envoy/envoy.default.yaml:ro
      # Entrypoint script
      - ./configs/envoy/entrypoint.sh:/entrypoint.sh:ro

    entrypoint: ["/bin/sh", "/entrypoint.sh"]

    # No env vars needed: ext_authz filter talks to warden (local, no auth)

    # JSON logs to stdout (captured by Docker, read by log shipper)
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

    # On BOTH networks - cell-net for cell access, infra-net for egress + CP access
    networks:
      cell-net:
        ipv4_address: 10.200.1.10
      infra-net:
        ipv4_address: 10.200.2.10

    deploy:
      resources:
        limits:
          cpus: '0.10'
          memory: 80M
        reservations:
          cpus: '0.05'
          memory: 32M

    restart: unless-stopped

    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/9901'"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ===========================================================================
  # MITM Proxy - TLS termination for HTTPS egress
  # Decrypts HTTPS traffic and forwards as HTTP to Envoy, enabling
  # credential injection, rate limiting, and path filtering for HTTPS.
  # ===========================================================================
  mitm-proxy:
    image: ghcr.io/kashyaprpuranik/mitmproxy:10.4.2-re2
    build:
      context: ./configs/mitm
      dockerfile: Dockerfile
    container_name: mitm-proxy
    labels:
      - "cagent.log-collect=true"
    security_opt:
      - no-new-privileges:true

    command: >
      mitmdump
      --mode regular
      --listen-port 8080
      --set confdir=/etc/mitmproxy
      --set stream_large_bodies=1m
      --set upstream_cert=false
      --set connection_strategy=lazy
      --set flow_detail=0
      -s /etc/mitmproxy/mitm_addon.py
      -s /etc/mitmproxy/dlp_addon.py

    volumes:
      # Read-write: mitmproxy writes DH params and cert cache to confdir at startup
      - ./configs/mitm:/etc/mitmproxy

    # Only on cell-net — cell sends HTTPS here, mitmproxy forwards HTTP to Envoy
    networks:
      cell-net:
        ipv4_address: 10.200.1.15

    deploy:
      resources:
        limits:
          cpus: '0.10'
          memory: 80M
        reservations:
          cpus: '0.05'
          memory: 32M

    depends_on:
      - http-proxy

    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import socket; s=socket.socket(); s.settimeout(2); s.connect(('127.0.0.1',8080)); s.close()\""]
      interval: 10s
      timeout: 5s
      retries: 3

    restart: unless-stopped

  # ===========================================================================
  # Log Shipper - Log Collection & Forwarding
  # Collects Docker logs, gVisor audit logs, cell app logs
  # Optional: Only runs with --profile auditing
  # ===========================================================================
  log-shipper:
    image: ghcr.io/kashyaprpuranik/vector:0.36.0-alpine
    container_name: log-shipper
    profiles:
      - auditing
    security_opt:
      - no-new-privileges:true

    volumes:
      - ./configs/vector/vector.yaml:/etc/vector/vector.yaml:ro
      - ./configs/vector/sinks/${DATAPLANE_MODE:-standalone}.yaml:/etc/vector/sinks.yaml:ro
      - cell-logs:/var/log/cell:ro
      - log-shipper-data:/var/lib/vector
      - log-shipper-backup:/var/log/vector
      # Docker socket for container log collection
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # gVisor logs (requires runsc --debug-log=/var/log/runsc/)
      - /var/log/runsc:/var/log/runsc:ro

    environment:
      # Control plane API (used by connected sinks config)
      - CONTROL_PLANE_URL=${CONTROL_PLANE_URL:-}
      - CONTROL_PLANE_TOKEN=${CONTROL_PLANE_TOKEN:-}
      - ENVIRONMENT=${ENVIRONMENT:-development}
      # Local OpenObserve (used by connected sinks config)
      - OPENOBSERVE_URL=${OPENOBSERVE_URL:-http://log-store:5080}
      - OPENOBSERVE_USER=${OPENOBSERVE_USER:-admin@cagent.local}
      - OPENOBSERVE_PASSWORD=${OPENOBSERVE_PASSWORD:-openobserve-local-dev}

    command: ["--config", "/etc/vector/vector.yaml", "--config", "/etc/vector/sinks.yaml"]

    # Only on infra-net - can reach control plane
    networks:
      infra-net:
        ipv4_address: 10.200.2.4

    deploy:
      resources:
        limits:
          cpus: '0.10'
          memory: 48M
        reservations:
          cpus: '0.05'
          memory: 16M

    restart: unless-stopped

    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8686/health || kill -0 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ===========================================================================
  # Warden - Unified data plane service
  # Handles config generation, container management, CP sync, and admin UI
  # In admin profile: includes local admin UI (frontend + full API)
  # In managed profile: API-only (no frontend)
  # ===========================================================================
  warden:
    build:
      context: .
      dockerfile: services/warden/Dockerfile
    image: ghcr.io/kashyaprpuranik/cagent-warden:latest
    container_name: warden
    labels:
      - "cagent.log-collect=true"
    security_opt:
      - no-new-privileges:true
    profiles:
      - managed
      - admin

    environment:
      # Operation mode: "standalone" or "connected"
      - DATAPLANE_MODE=${DATAPLANE_MODE:-standalone}
      # Control plane connection (for connected mode)
      - CONTROL_PLANE_URL=${CONTROL_PLANE_URL:-}
      - CONTROL_PLANE_TOKEN=${CONTROL_PLANE_TOKEN:-}
      - HEARTBEAT_URL=${HEARTBEAT_URL:-}
      - HEARTBEAT_INTERVAL=${HEARTBEAT_INTERVAL:-600}
      - CONFIG_SYNC_INTERVAL=${CONFIG_SYNC_INTERVAL:-300}
      # CP-to-DP auth (connected mode, via mTLS)
      - WARDEN_API_TOKEN=${WARDEN_API_TOKEN:-}
      # Public URL where CP can reach this warden (self-hosted DPs)
      - WARDEN_PUBLIC_URL=${WARDEN_PUBLIC_URL:-}
      # Cloud provider (for public IP detection in heartbeat)
      - CLOUD_PROVIDER=${CLOUD_PROVIDER:-}
      # mTLS (base64-encoded PEM, provisioned by CP via cloud-init)
      - WARDEN_TLS_CERT=${WARDEN_TLS_CERT:-}
      - WARDEN_TLS_KEY=${WARDEN_TLS_KEY:-}
      - WARDEN_MTLS_CA_CERT=${WARDEN_MTLS_CA_CERT:-}
      # Local OpenObserve (per-DP log analytics)
      - OPENOBSERVE_URL=${OPENOBSERVE_URL:-http://log-store:5080}
      - OPENOBSERVE_USER=${OPENOBSERVE_USER:-admin@cagent.local}
      - OPENOBSERVE_PASSWORD=${OPENOBSERVE_PASSWORD:-openobserve-local-dev}
      # OpenTelemetry tracing (opt-in, off by default)
      - OTEL_ENABLED=${OTEL_ENABLED:-false}
      # Local admin settings
      - DATA_PLANE_DIR=/app/cagent
      - RUNTIME_CONFIG_PATH=${RUNTIME_CONFIG_PATH:-}

    volumes:
      # Docker socket for container management
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # Main config file (read-write for admin UI config editing)
      - ./configs/cagent.yaml:/etc/cagent/cagent.yaml
      # Connected-mode config (minimal — no domains/resources/security)
      - ./configs/cagent_connected.yaml:/etc/cagent/cagent_connected.yaml
      # CoreDNS config directory (warden overwrites Corefile here)
      - ./configs/coredns:/etc/coredns
      # HTTP proxy config volume (warden writes generated config here)
      - proxy-config:/etc/envoy
      # Email config directory (warden writes accounts.json here)
      - ./configs/email:/etc/cagent/email
      # Seccomp profiles for container recreation
      - ./configs/seccomp/profiles:/etc/seccomp/profiles:ro
      # Data plane directory (for .env and docker-compose access)
      - .:/app/cagent

    ports:
      - "${LOCAL_ADMIN_PORT:-8081}:8080"
      - "${WARDEN_MTLS_PORT:-8443}:8443"

    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
        reservations:
          cpus: '0.10'
          memory: 64M

    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

    networks:
      infra-net:
        ipv4_address: 10.200.2.2

    restart: unless-stopped

  # ===========================================================================
  # Log Store - Local OpenObserve instance for per-DP log analytics
  # Receives logs from Vector, queryable by warden for dashboard analytics
  # Optional: Only runs with --profile auditing
  # ===========================================================================
  log-store:
    image: public.ecr.aws/zinclabs/openobserve:latest
    container_name: log-store
    profiles:
      - auditing
    security_opt:
      - no-new-privileges:true

    environment:
      - ZO_ROOT_USER_EMAIL=${OPENOBSERVE_USER:-admin@cagent.local}
      - ZO_ROOT_USER_PASSWORD=${OPENOBSERVE_PASSWORD:-openobserve-local-dev}
      - ZO_COMPACT_DATA_RETENTION_DAYS=${LOG_RETENTION_DAYS:-30}
      - ZO_DATA_DIR=/data
      # Cap worker threads to avoid OOM on high-core machines (default = num CPUs)
      - ZO_HTTP_WORKER_NUM=2
      - ZO_HTTP_WORKER_MAX_BLOCKING=2

    volumes:
      - log-store-data:/data

    networks:
      infra-net:
        ipv4_address: 10.200.2.7

    deploy:
      resources:
        limits:
          cpus: '0.10'
          memory: 160M
        reservations:
          cpus: '0.05'
          memory: 48M

    restart: unless-stopped

  # ===========================================================================
  # Email Proxy - Controlled email access (IMAP/SMTP) for agents
  # Supports Gmail (OAuth2), Outlook (OAuth2), and generic IMAP/SMTP
  # Optional: Only runs with --profile email
  # ===========================================================================
  email-proxy:
    build:
      context: ./services/email_proxy
    image: ghcr.io/kashyaprpuranik/cagent-email-proxy:latest
    container_name: email-proxy
    labels:
      - "cagent.log-collect=true"
    security_opt:
      - no-new-privileges:true
    profiles:
      - email

    environment:
      - CAGENT_CONFIG_PATH=/etc/cagent/cagent.yaml
      - EMAIL_GENERATED_CONFIG=/etc/cagent/email/accounts.json
      # Gmail OAuth (set in .env or shell)
      - GMAIL_CLIENT_ID=${GMAIL_CLIENT_ID:-}
      - GMAIL_CLIENT_SECRET=${GMAIL_CLIENT_SECRET:-}
      - GMAIL_REFRESH_TOKEN=${GMAIL_REFRESH_TOKEN:-}
      # Outlook/M365 OAuth (set in .env or shell)
      - OUTLOOK_CLIENT_ID=${OUTLOOK_CLIENT_ID:-}
      - OUTLOOK_CLIENT_SECRET=${OUTLOOK_CLIENT_SECRET:-}
      - OUTLOOK_REFRESH_TOKEN=${OUTLOOK_REFRESH_TOKEN:-}
      # Generic mail password (set in .env or shell)
      - MAIL_PASSWORD=${MAIL_PASSWORD:-}

    volumes:
      - ./configs/cagent.yaml:/etc/cagent/cagent.yaml:ro
      # Generated email config (written by warden from CP sync)
      - ./configs/email:/etc/cagent/email:ro

    # On infra-net only - cell accesses via Envoy on cell-net
    networks:
      infra-net:
        ipv4_address: 10.200.2.40

    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8025/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

    restart: unless-stopped

# =============================================================================
# Networks
# =============================================================================
networks:
  # Cell network - INTERNAL, no external access
  cell-net:
    name: cagent-cell-net
    driver: bridge
    internal: true  # No external connectivity
    enable_ipv6: false  # Prevent IPv6 bypass of egress controls
    ipam:
      config:
        - subnet: 10.200.1.0/24

  # Infrastructure network - can reach control plane
  infra-net:
    name: cagent-infra-net
    driver: bridge
    enable_ipv6: false  # Prevent IPv6 bypass of egress controls
    ipam:
      config:
        - subnet: 10.200.2.0/24

# =============================================================================
# Volumes
# =============================================================================
volumes:
  cell-logs:
  cell-workspace:
  proxy-config:
  log-shipper-data:
  log-shipper-backup:
  log-store-data:
