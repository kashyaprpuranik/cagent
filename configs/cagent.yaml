internal_services:
- backend
- envoy
- dns-filter
- vector
mode: standalone
rate_limits:
  default:
    burst_size: 20
    requests_per_minute: 120
resources:
  cpu_limit: 2.0
  memory_limit_mb: 2048
  pids_limit: 256
security:
  runtime_policy: standard
