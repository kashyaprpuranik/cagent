# =============================================================================
# Vector Sinks - Connected Mode
# Ships logs to local VictoriaLogs (per-DP log store) and keeps a file backup.
# Used when DATAPLANE_MODE=connected.
# =============================================================================

sinks:
  # Local VictoriaLogs (per-DP log analytics)
  # Logs are stored locally and queryable by the warden API.
  # The CP queries warden via mTLS for connected tenants.
  log_store:
    type: elasticsearch
    inputs:
      - parse_docker
      - parse_gvisor
      - parse_cell_app
    endpoints:
      - http://log-store:9428/insert/elasticsearch/
    mode: bulk
    suppress_type_name: true
    query:
      _msg_field: message
      _time_field: timestamp
      _stream_fields: "source,log_type,hostname"
    bulk:
      index: cagent_logs
    healthcheck:
      enabled: false
    batch:
      max_events: ${VECTOR_BATCH_MAX_EVENTS:-200}
      timeout_secs: ${VECTOR_BATCH_TIMEOUT_SECS:-10}

  # Local file backup (safety net if VL is temporarily down)
  file_backup:
    type: file
    inputs:
      - parse_docker
      - parse_gvisor
      - parse_cell_app
    path: /var/log/vector/backup/%Y-%m-%d.log
    encoding:
      codec: json
